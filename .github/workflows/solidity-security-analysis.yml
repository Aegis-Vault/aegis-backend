name: Solidity Security Analysis

on:
  push:
    paths:
      - "**.sol" # Run scan when Solidity files are updated
  pull_request:
    paths:
      - "**.sol" # Run scan when PRs modify Solidity files
  workflow_dispatch: # Keep manual trigger

jobs:
  security_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting Solidity Security Analysis"

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:ethereum/ethereum
          sudo apt update
          sudo apt install -y solc python3-pip
          pip install slither-analyzer

      - name: Install Slither
        run: pip install slither-analyzer
        
      - name: Run Slither Analysis
        run: slither contracts/ --json security_report.json
 
      - name: Debug - List Directory Contents
        run: ls -la
         
      - name: Upload Security Report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          SECURITY_REPORT=$(jq -c . security_report.json) # Properly encode JSON
          curl -X POST -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/Aegis-Vault/AegisVault/issues \
          -d '{"title": "Security Report", "body": "'"${SECURITY_REPORT}"'"}'
