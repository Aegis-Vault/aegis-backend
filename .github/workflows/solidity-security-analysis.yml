name: Solidity Security Analysis

on:
  push:
    paths:
      - "**.sol"  # Run scan when Solidity files are updated
  pull_request:
    paths:
      - "**.sol"  # Run scan when PRs modify Solidity files
  workflow_dispatch:  # Keep manual trigger

jobs:
  security_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting Solidity Security Analysis"

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies (Solidity & Slither)
        run: |
          sudo apt update
          sudo apt install -y curl wget python3 python3-pip
          wget https://github.com/ethereum/solidity/releases/download/v0.8.21/solc-static-linux -O solc
          chmod +x solc
          sudo mv solc /usr/local/bin/
          solc --version
          pip install slither-analyzer
          slither --version

      - name: Run Slither Analysis
        run: slither contracts/ --json security_report.json || echo "{}" > security_report.json
 
      - name: Debug - List Directory Contents
        run: ls -la
         
      - name: Upload Security Report
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f security_report.json ]; then
            SECURITY_REPORT=$(jq -c . security_report.json)
            curl -X POST -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Aegis-Vault/AegisVault/issues \
            -d '{"title": "Security Report", "body": "'"$SECURITY_REPORT"'"}'
          else
            echo "Security report not found! Skipping upload."
          fi
